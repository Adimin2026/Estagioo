<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="../">
    <title>Admin - Portal de Estágio IFRO</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/pages/admin.css">
    <link rel="icon" href="assets/images/logo-ifro.svg" type="image/svg+xml">
</head>
<body>
    <div id="header-root"></div>

    <main class="main-content">
        <div class="container">
            <nav class="breadcrumb">
                <ol class="breadcrumb-list">
                    <li class="breadcrumb-item"><a href="index.html" class="breadcrumb-link">Início</a></li>
                    <li class="breadcrumb-item"><span class="breadcrumb-current">Admin</span></li>
                </ol>
            </nav>

            <header class="page-header">
                <h1 class="page-title">Administração</h1>
                <p class="page-subtitle">Gerencie as dicas enviadas pelos estudantes</p>
            </header>

            <div id="admin-panel" class="admin-panel fade-in">
                <div class="admin-section">
                    <h2 class="section-title">Pendentes</h2>
                    <div id="admin-pending" class="admin-list"></div>
                </div>

                <div class="admin-section">
                    <h2 class="section-title">Aprovadas</h2>
                    <div id="admin-approved" class="admin-list"></div>
                </div>

                <div class="admin-section">
                    <h2 class="section-title">Rejeitadas</h2>
                    <div id="admin-rejected" class="admin-list"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-root"></div>

    <script src="js/utils/storage.js" defer></script>
    <script src="js/theme-toggle.js" defer></script>
    <script src="js/navigation.js" defer></script>
    <script src="js/components.js" defer></script>
    <script src="js/animations.js" defer></script>
    <script src="js/admin.js" defer></script>
    <script src="js/main.js" defer></script>
</body>
</html>
