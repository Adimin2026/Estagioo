<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="../">
    <title>Chat IA - IFRO Campus Ariquemes</title>
    <meta name="description" content="Assistente de IA para estagiários do IFRO: dúvidas de estágio, programação, manutenção e mais.">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/pages/chat.css">
    <link rel="icon" href="assets/images/logo-ifro.svg" type="image/svg+xml">
</head>
<body>
    <div id="header-root"></div>

    <main class="main-content">
        <div class="container">
            <nav class="breadcrumb"><ol class="breadcrumb-list">
                <li class="breadcrumb-item"><a href="index.html" class="breadcrumb-link">Início</a></li>
                <li class="breadcrumb-item"><span class="breadcrumb-current">Chat IA</span></li>
            </ol></nav>

            <header class="page-header">
                <h1 class="page-title">Chat IA do Estagiário</h1>
                <p class="page-subtitle">Tire dúvidas sobre estágio, programação, manutenção, banco de dados e impressoras.</p>
            </header>

            <div class="chat-shell">
                <aside class="chat-sidebar">
                    <button class="btn btn-ghost btn-block chat-new">+ Nova conversa</button>
                    <div class="chat-prompts">
                        <p class="chat-prompts-title">Comece por aqui:</p>
                        <button class="chat-prompt-btn" data-prompt="Como funciona o Termo de Compromisso de estágio?">📋 Termo de Compromisso</button>
                        <button class="chat-prompt-btn" data-prompt="Dê dicas para meu primeiro dia como estagiário de TI.">🚀 Primeiro dia de estágio</button>
                        <button class="chat-prompt-btn" data-prompt="Como resolver um atolamento de papel em impressora?">🖨️ Impressora atolada</button>
                        <button class="chat-prompt-btn" data-prompt="Explique o que é normalização em banco de dados.">🗄️ Banco de dados</button>
                        <button class="chat-prompt-btn" data-prompt="Quais os comandos Git mais usados no estágio?">💻 Git essencial</button>
                    </div>
                </aside>

                <section class="chat-main">
                    <div class="chat-messages" id="chatMessages">
                        <div class="chat-empty">
                            <div class="chat-empty-icon">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                            </div>
                            <h3>Como posso ajudar?</h3>
                            <p>Faça uma pergunta ou use um dos atalhos ao lado.</p>
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <textarea id="chatInput" class="chat-input" rows="1" placeholder="Digite sua mensagem..."></textarea>
                        <button class="btn btn-primary chat-send" id="chatSend">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <div id="footer-root"></div>

    <button class="chat-fab" id="chatFab" aria-label="Abrir chat">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    </button>

    <script src="js/utils/storage.js" defer></script>
    <script src="js/theme-toggle.js" defer></script>
    <script src="js/navigation.js" defer></script>
    <script src="js/components.js" defer></script>
    <script src="js/utils/api.js" defer></script>
    <script src="js/chat/chat.js" defer></script>
    <script src="js/main.js" defer></script>
</body>
</html>
